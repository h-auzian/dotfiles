# No focus on mouse.
focus_follows_mouse off

# No borders.
for_window [class="^.*"] border pixel 0

# No title bar.
for_window [class="^.*"] title_format " "
font pango:Iosevka 0

# Tabs by default.
workspace_layout tabbed

# Gaps.
gaps inner 16px
gaps bottom -11px
smart_gaps off

# Workspace priorities per output.
set $primary HDMI-1
set $secondary eDP-1
workspace 1 output $primary $secondary
workspace 2 output $primary $secondary
workspace 3 output $primary $secondary
workspace 4 output $primary $secondary
workspace 5 output $primary $secondary
workspace 6 output $primary $secondary
workspace 7 output $primary secondary
workspace 8 output $primary $secondary
workspace 9 output $primary $secondary
workspace 10 output $primary $secondary
workspace 11 output $primary $secondary
workspace 12 output $secondary
