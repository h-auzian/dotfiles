# OSD.
w cycle-values osd-level 1 2 3
m show-progress

# Time.
j seek -3
l seek 3
Shift+l seek 1
Shift+j seek -1

a seek 0 absolute-percent
d seek 100 absolute-percent

1 seek 10 absolute-percent
2 seek 20 absolute-percent
3 seek 30 absolute-percent
4 seek 40 absolute-percent
5 seek 50 absolute-percent
6 seek 60 absolute-percent
7 seek 70 absolute-percent
8 seek 80 absolute-percent
9 seek 90 absolute-percent

# Volume.
Shift+i add volume 5
Shift+k add volume -5
v set volume 100

# Speed.
i add speed 0.25
k add speed -0.25
: add speed 0.25
; add speed -0.25
s set speed 1

# Playlist.
Ctrl+j playlist-prev
Ctrl+l playlist-next
Ctrl+s playlist-shuffle; show-text "${playlist}"
Ctrl+r cycle-values loop-file inf no
Ctrl+p cycle-values loop-playlist inf no
Ctrl+a cycle-values keep-open always yes
e show-text "${playlist}"

# Script shortcuts to write the current timestamp to a text file.
u run bash -c "~/.config/scripts/mpv-copy-timestamp.sh start ${filename/no-ext} ${time-pos/full}"
o run bash -c "~/.config/scripts/mpv-copy-timestamp.sh end ${filename/no-ext} ${time-pos/full}"
p run bash -c "~/.config/scripts/mpv-copy-timestamp.sh finish"
